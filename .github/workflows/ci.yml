  #       with:
  #         python-version: "3.12"
  #     - name: Create virtualenv
  #       run: |
  #         python -m venv .venv
  #         echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
  #     - name: Build and install
  #       uses: PyO3/maturin-action@v1
  #       with:
  #         command: develop
  #         args: --extras dev
  #     - name: Run Python tests
  #       run: pytest tests/ -v

  build-wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS x86_64
          - os: macos-14
            target: x86_64-apple-darwin
          # macOS ARM
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist -i python3.9
          manylinux: 2_28
          before-script-linux: |
            dnf install -y perl-core llvm-toolset
            export LIBCLANG_PATH=$(find /usr -name 'libclang.so*' -print -quit | xargs dirname)
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  build-sdist:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
