  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux aarch64 (cross-compiled via QEMU in manylinux container)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS Intel (cross-compiled from ARM runner)
          - os: macos-14
            target: x86_64-apple-darwin
          # macOS Apple Silicon (native runner)
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          manylinux: 2_28
          before-script-linux: |
            if command -v yum &>/dev/null; then
              yum install -y perl-core llvm-toolset zlib-devel bzip2-devel xz-devel
            elif command -v apt-get &>/dev/null; then
              apt-get update
              apt-get install -y libclang-dev zlib1g-dev libbz2-dev liblzma-dev
              # Point bindgen to the cross-compilation sysroot so it finds
              # the correct target headers instead of host x86_64 headers
              SYSROOT=$(find /usr -path "*/aarch64-unknown-linux-gnu/sysroot" -type d 2>/dev/null | head -1)
              if [ -n "$SYSROOT" ]; then
                export BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu="--sysroot=$SYSROOT"
              fi
            fi
            LIBCLANG_PATH=$(find /usr -name 'libclang.so*' -print -quit 2>/dev/null | xargs dirname 2>/dev/null || true)
            export LIBCLANG_PATH

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
