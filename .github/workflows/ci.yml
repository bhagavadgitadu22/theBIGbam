name: CI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   env:
  #     VIRTUAL_ENV: ${{ github.workspace }}/.venv
  #   steps:
  #     - uses: actions/checkout@v4
