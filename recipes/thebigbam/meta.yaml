{% set name = "thebigbam" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/thebigbam/thebigbam-{{ version }}.tar.gz
  sha256: <filled after PyPI publish>

build:
  number: 0
  skip: True  # [win]
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python >=3.9
    - pip
    - maturin >=1.4,<2.0
  run:
    - python >=3.9
    - bokeh >=3.0
    - panel >=1.0
    - biopython >=1.79
    - pysam >=0.20
    - dna-features-viewer >=1.0
    - python-duckdb >=1.0
    - samtools
    - bwa-mem2
    - minimap2

test:
  imports:
    - thebigbam
    - thebigbam_rs
  commands:
    - thebigbam --help

about:
  home: https://github.com/bhagavadgitadu22/theBIGbam
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Compression and interactive exploration of large-scale sequencing alignments with circular mapping support"
  dev_url: https://github.com/bhagavadgitadu22/theBIGbam

extra:
  recipe-maintainers:
    - bhagavadgitadu22
